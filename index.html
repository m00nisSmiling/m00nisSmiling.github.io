<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Archive | Full Title View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');

        body {
            background: #050505;
            color: white;
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
        }

        /* 3D "Push" Perspective */
        .deck-wrapper {
            perspective: 2000px;
            padding: 4rem 2rem;
        }

        .poke-card {
            background: rgba(20, 20, 20, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            /* Force the card to have a minimum height but allow it to grow */
            min-height: 400px;
            display: flex;
            flex-direction: column;
        }

        /* Holographic Shimmer Effect */
        .poke-card::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 20px;
            background: linear-gradient(135deg, 
                transparent 0%, 
                rgba(0, 255, 157, 0.05) 45%, 
                rgba(0, 255, 157, 0.15) 50%, 
                rgba(0, 255, 157, 0.05) 55%, 
                transparent 100%);
            z-index: 1;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .poke-card:hover {
            transform: translateY(-20px) rotateX(0deg) scale(1.05);
            border-color: #00ff9d;
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.2);
            z-index: 50;
        }

        .poke-card:hover::before { opacity: 1; }

        /* The fix for wrapping text */
        .title-wrap {
            word-wrap: break-word;
            overflow-wrap: break-word;
            display: block;
            line-height: 1.3;
        }

        .risk-Critical { background: #ef4444; box-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
        .risk-High { background: #f97316; box-shadow: 0 0 10px rgba(249, 115, 22, 0.5); }
    </style>
</head>
<body class="p-4 md:p-12">

    <header class="text-center mb-12">
        <h1 class="text-4xl md:text-6xl font-bold tracking-tighter uppercase italic text-white">
            Bug Hunter <span class="text-[#00ff9d]">Collection</span>
        </h1>
        <p class="text-gray-500 font-mono text-xs mt-4 uppercase tracking-[0.4em]">Vault_Access: Granted</p>
    </header>

    <div class="deck-wrapper">
        <div id="card-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 max-w-7xl mx-auto">
            <!-- Cards Injected Here -->
        </div>
    </div>

    <script>
        async function loadArchive() {
            const cacheBuster = Date.now();
            const response = await fetch(`data.json?v=${cacheBuster}`);
            const data = await response.json();
            const grid = document.getElementById('card-grid');

            grid.innerHTML = data.map((item, index) => {
                // Random subtle tilt for the "pushed" look
                const tilt = (index % 2 === 0) ? 'rotate(1deg)' : 'rotate(-1deg)';
                
                return `
                <div class="poke-card group" style="transform: rotateX(15deg) ${tilt};">
                    <!-- Image Container -->
                    <div class="p-3">
                        <div class="relative rounded-xl overflow-hidden bg-black aspect-video border border-white/10">
                            <img src="${item.imageUrl}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" alt="Bounty Evidence">
                            <div class="absolute top-2 right-2 text-[10px] font-bold px-2 py-1 rounded risk-${item.risk} text-white">
                                ${item.risk}
                            </div>
                        </div>
                    </div>

                    <!-- Details Section -->
                    <div class="p-6 flex-grow flex flex-col justify-between">
                        <div>
                            <h2 class="title-wrap text-xl md:text-2xl font-bold text-white group-hover:text-[#00ff9d] transition-colors mb-4">
                                ${item.title}
                            </h2>
                        </div>
                        
                        <div class="flex justify-between items-center border-t border-white/5 pt-4 font-mono">
                            <div class="text-[10px] text-[#00ff9d] uppercase tracking-widest">${item.type}</div>
                            <div class="text-[10px] text-gray-500">${item.date}</div>
                        </div>
                    </div>

                    <!-- Aesthetic Bottom Bar -->
                    <div class="h-1.5 w-full bg-gradient-to-r from-transparent via-[#00ff9d] to-transparent opacity-20"></div>
                </div>
                `;
            }).join('');
        }

        loadArchive();
    </script>
</body>
</html>
