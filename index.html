<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achievements of m00nissmiling</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0a 100%);
            color: #e5e5e5;
            overflow-x: hidden;
        }

        /* Responsive Grid Setup */
        .deck-container {
            display: grid;
            /* Changed minmax to 280px so it fits perfectly on all Android/iOS screens */
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            grid-auto-rows: 1fr; 
            gap: 1.5rem; 
            padding: 1rem;
            width: 100%;
            box-sizing: border-box;
        }

        /* Laptop/Desktop View Configuration */
        @media (min-width: 1024px) {
            .deck-container {
                perspective: 1200px; /* Perspective only handled on desktop */
                grid-template-columns: repeat(4, 1fr); 
                padding: 4rem 2rem;
                gap: 2.5rem;
            }
        }

        /* Pokemon Card Base Style (Flat for Mobile) */
        .poke-card {
            background: linear-gradient(135deg, #222 0%, #111 100%);
            border: 4px solid #333;
            border-radius: 15px;
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            height: 100%; 
        }

        /* Apply the 3D "Pushing" Perspective tilt ONLY on Desktop screens */
        @media (min-width: 1024px) {
            .poke-card {
                transform: rotateX(20deg) rotateY(-10deg);
            }
            .poke-card:hover {
                transform: rotateX(0deg) rotateY(0deg) scale(1.05) translateY(-15px);
                border-color: #4ade80; 
                z-index: 50;
                box-shadow: 0 0 30px rgba(74, 222, 128, 0.3);
            }
        }

        /* Clean scale up hover animation for mobile/touch screens */
        @media (max-width: 1023px) {
            .poke-card:active, .poke-card:hover {
                border-color: #4ade80;
                transform: scale(1.02);
            }
        }

        .risk-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.6rem;
            font-weight: bold;
            text-transform: uppercase;
            z-index: 10;
        }

        .Critical { background: #ef4444; color: white; }
        .High { background: #f97316; color: white; }
        
        .poke-card::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.05) 45%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 55%, transparent 60%);
            pointer-events: none;
            border-radius: 11px; 
        }

        .title-area {
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
    </style>
</head>
<body class="min-h-screen p-2 sm:p-4 md:p-8">

    <header class="text-center mb-12 pt-6">
        <h1 class="text-3xl sm:text-5xl font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-blue-500 uppercase">
            Achievements 
        </h1>
        <p class="font-mono text-xs text-gray-500 mt-2 underline decoration-green-500/50">Of m00nissmiling</p>
    </header>

    <div id="portfolio-grid" class="deck-container max-w-[1600px] mx-auto">
        </div>

    <script>
        async function loadPortfolio() {
            const cacheBuster = new Date().getTime();
            const url = `data.json?v=${cacheBuster}`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                const grid = document.getElementById('portfolio-grid');

                grid.innerHTML = data.map(item => `
                <div class="poke-card group">
                    <div class="risk-badge ${item.risk}">${item.risk}</div>
                    
                    <div class="p-2">
                        <div class="bg-black rounded-lg overflow-hidden border border-white/10 relative">
                            <a href="${item.imageUrl}" target="_blank" title="View Full Evidence">
                                <img src="${item.imageUrl}" class="w-full h-40 object-cover hover:opacity-80 transition-opacity cursor-pointer">
                            </a>
                            <div class="absolute bottom-1 right-1 bg-black/70 px-2 py-0.5 rounded text-[10px] font-mono text-white uppercase tracking-tighter pointer-events-none">
                                ${item.country || 'Unknown'}
                            </div>
                        </div>
                    </div>

                    <div class="p-4 flex flex-col flex-grow">
                        <div class="text-[9px] font-mono text-blue-400 uppercase tracking-widest mb-2 block">
                            PROJECT: ${item.project || 'Private'}
                        </div>
                        
                        <div class="title-area flex-grow">
                            <h3 class="text-md font-bold text-white leading-tight">${item.title}</h3>
                        </div>

                        <div class="flex justify-between items-center mt-6 pt-3 border-t border-white/5 font-mono text-[9px]">
                            <span class="text-green-400 italic">${item.type}</span>
                            <span class="text-gray-500">${item.date}</span>
                        </div>
                    </div>
                </div>
                `).join('');
            } catch (err) {
                console.error("Failed to load cards:", err);
            }
        }

        loadPortfolio();
    </script>
</body>
</html>
