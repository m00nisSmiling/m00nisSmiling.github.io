<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Archive: Pokemon Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0a 100%);
            color: #e5e5e5;
            overflow-x: hidden;
        }

        /* The 3D "Pushing" Perspective Container */
        .deck-container {
            perspective: 1200px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            padding: 4rem;
        }

        /* Pokemon Card Style */
        .poke-card {
            background: linear-gradient(135deg, #222 0%, #111 100%);
            border: 4px solid #333;
            border-radius: 15px;
            position: relative;
            transform: rotateX(20deg) rotateY(-10deg);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            cursor: pointer;
        }

        .poke-card:hover {
            transform: rotateX(0deg) rotateY(0deg) scale(1.1) translateY(-20px);
            border-color: #4ade80; /* Highlight on hover */
            z-index: 50;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.3);
        }

        .risk-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .Critical { background: #ef4444; color: white; }
        .High { background: #f97316; color: white; }
        
        /* Card Holographic Sheen Effect */
        .poke-card::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.05) 45%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 55%, transparent 60%);
            pointer-events: none;
        }
    </style>
</head>
<body class="min-h-screen p-8">

    <header class="text-center mb-16">
        <h1 class="text-5xl font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-blue-500 uppercase">
            Bug Hunter Archive
        </h1>
        <p class="font-mono text-xs text-gray-500 mt-4 underline decoration-green-500/50">DATASET LOADED FROM SECURE_JSON</p>
    </header>

    <div id="portfolio-grid" class="deck-container max-w-7xl mx-auto">
        <!-- Cards Injected Here -->
    </div>

    <script>
        async function loadPortfolio() {
            // CASE BUSTER / CACHE BUSTER implementation
            const cacheBuster = new Date().getTime();
            const url = `data.json?v=${cacheBuster}`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                const grid = document.getElementById('portfolio-grid');

                grid.innerHTML = data.map(item => `
                    <div class="poke-card">
                        <div class="risk-badge ${item.risk}">${item.risk}</div>
                        <div class="p-2">
                            <div class="bg-black rounded-lg overflow-hidden border border-white/10">
                                <img src="${item.imageUrl}" class="w-full h-48 object-cover">
                            </div>
                        </div>
                        <div class="p-4">
                            <h3 class="text-lg font-bold text-white truncate">${item.title}</h3>
                            <div class="flex justify-between items-center mt-3 font-mono text-[10px]">
                                <span class="text-green-400">${item.type}</span>
                                <span class="text-gray-500">${item.date}</span>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Failed to load cards:", err);
            }
        }

        loadPortfolio();
    </script>
</body>
</html>
